
name: CI

on: [push, pull_request]

env:
  # This is required to enable the web_sys clipboard API which egui_web uses
  # https://rustwasm.github.io/wasm-bindgen/api/web_sys/struct.Clipboard.html
  # https://rustwasm.github.io/docs/wasm-bindgen/web-sys/unstable-apis.html
  RUSTFLAGS: --cfg=web_sys_unstable_apis

jobs:
  validation:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu GTK
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            flags: '--no-default-features --features gtk3'
          - name: Ubuntu XDG
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            flags: '--no-default-features --features xdg-portal'
          - name: Windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            flags: ''
          - name: Windows NO-CC6
            os: windows-latest
            target: x86_64-pc-windows-msvc
            flags: '--no-default-features --features xdg-portal'
          - name: macOS
            os: macos-latest
            target: x86_64-apple-darwin
            flags: ''
          - name: WASM32
            os: ubuntu-latest
            target: wasm32-unknown-unknown
            flags: '--lib'
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v2
      - name: "[Ubuntu] install dependencies"
        if: matrix.name == 'Ubuntu GTK'
        run: sudo apt update && sudo apt install libgtk-3-dev
      - name: "[WASM] rustup"
        if: matrix.name == 'WASM32'
        run: rustup target add wasm32-unknown-unknown
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - uses: actions-rs/cargo@v1
        with:
          command: build
          args: --target ${{ matrix.target }} ${{ matrix.flags }}
      - name: "[Ubuntu] install test dependencies"
        if: matrix.name == 'Ubuntu GTK'
        run: sudo apt-get install libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev libspeechd-dev libxkbcommon-dev libssl-dev
      - uses: actions-rs/cargo@v1
        with:
          command: test
          args: --lib

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - run: rustup component add rustfmt
      - uses: actions-rs/cargo@v1
        with:
          command: fmt
          args: --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: sudo apt update && sudo apt install libgtk-3-dev
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      - run: rustup component add clippy
      - uses: actions-rs/cargo@v1
        with:
          command: clippy
          args: -- -D warnings
